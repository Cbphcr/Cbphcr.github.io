<script>
  $(document).ready(function () {
    var expectedScholarId = '{{ site.google_scholar_id }}';

    function setCitationStatus(text) {
      var totalCitationEle = document.getElementById('total_cit');
      if (totalCitationEle) {
        totalCitationEle.innerHTML = text;
      }
    }

    {% if site.google_scholar_stats_use_cdn %}
    var gsDataBaseUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@';
    {% else %}
    var gsDataBaseUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/';
    {% endif %}

    $.getJSON(gsDataBaseUrl + 'google-scholar-stats/gs_data.json', function (data) {
      if (!data || data['scholar_id'] !== expectedScholarId) {
        setCitationStatus('unavailable');
        return;
      }
      setCitationStatus(data['citedby']);
    }).fail(function () {
      setCitationStatus('unavailable');
    });
  });
</script>
