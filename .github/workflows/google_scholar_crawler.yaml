name: Get Citation Data

on:
  workflow_dispatch:
  page_build:
  schedule:
    - cron: '0 8 * * *'

concurrency:
  group: google-scholar-stats
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: google_scholar_crawler/requirements.txt
      - name: Install Reqs
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r google_scholar_crawler/requirements.txt
      - name: Fetch Previous Data
        run: |
          mkdir -p google_scholar_crawler/results
          curl -fsSL "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/google-scholar-stats/gs_data.json" -o google_scholar_crawler/results/gs_data.previous.json || true
      - name: Run Crawler
        run: |
          cd ./google_scholar_crawler
          python main.py
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID || '_NHh89YAAAAJ' }}
          GOOGLE_SCHOLAR_TIMEOUT_SECONDS: 120
      - name: Push Citation Data
        run: |
          cd ./google_scholar_crawler
          cd ./results
          git init
          git config --local user.name "${GITHUB_ACTOR}"
          export remote_repo="https://${GITHUB_ACTOR}:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
          git add gs_data.json gs_data_shieldsio.json
          git commit -m "Updated Citation Data"
          git push "${remote_repo}" HEAD:google-scholar-stats --force
